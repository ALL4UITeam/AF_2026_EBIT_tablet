<!DOCTYPE html>
<html lang="ko">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>가이드 | E-BIT 관리자</title>
  {{> meta}}
</head>

<body class="al-admin">
  <div class="al-wrap">

    {{> header }}

    <div class="al-body">
      <div class="al-backdrop" id="alBackdrop" aria-hidden="true"></div>

      {{> nav }}
      <main class="al-content" id="alContent">
        <section class="card">
          <h3 class="card__title">운영관리 Modal</h3>
          <div class="al-guide-row">
            <button type="button" class="btn btn--primary btn--md" data-al-modal-open="operation-task-device-select">작업 지시 등록(단말선택)</button>
            <button type="button" class="btn btn--primary btn--md" data-al-modal-open="operation-task-assignee-select">작업 지시 등록(작업자 선택)</button>
            <button type="button" class="btn btn--primary btn--md" data-al-modal-open="operation-task-content">작업 지시 등록(작업 내용)</button>
            <button type="button" class="btn btn--primary btn--md" data-al-modal-open="operation-task-register-complete">작업 지시 등록(완료)</button>
            <button type="button" class="btn btn--primary btn--md" data-al-modal-open="operation-task-edit-terminal">작업 지시 수정(단말 정보)</button>
            <button type="button" class="btn btn--primary btn--md" data-al-modal-open="operation-task-edit-assignee">작업 지시 수정(작업자 선택)</button>
            <button type="button" class="btn btn--primary btn--md" data-al-modal-open="operation-task-edit-work">작업 지시 수정(작업 내용)</button>
            <button type="button" class="btn btn--primary btn--md" data-al-modal-open="operation-task-detail">작업 지시 수정(완료)</button>
            <button type="button" class="btn btn--secondary btn--md" data-al-modal-open="al-modal-warning-1">경고(오류)</button>
            <button type="button" class="btn btn--secondary btn--md" data-al-modal-open="al-modal-warning-2">경고(OTP초기화)</button>
            <button type="button" class="btn btn--secondary btn--md" data-al-modal-open="al-modal-confirm">확인</button>
            <button type="button" class="btn btn--secondary btn--md" data-al-modal-open="al-modal-modify">수정</button>
            <button type="button" class="btn btn--secondary btn--md" data-al-modal-open="al-modal-regist">등록</button>
          </div>
        </section>

        {{>modal-operation }}
        {{>modal-common-alerts }}



      </main>
      <!-- // al-content -->
    </div>
  </div>




  <script type="module" src="./js/page/index.js"></script>
</body>

</html>
