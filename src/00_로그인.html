<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>E-bit 관리자</title>
    {{> meta}}
</head>

<body class="login-page">

    <main class="login-page__main">
        <div class="login-page__bg" aria-hidden="true"></div>

        <div class="login-page__column">
            <!-- Figma 749:10637 img 1 — 배경 데코(bg-item)와 분리된 아이소메트릭 영역 -->
            <div class="login-page__illus" aria-hidden="true">
                <img class="login-page__illus-img" src="./assets/images/login/bg-item.png" alt="" width="302" height="252"
                    decoding="async" />
            </div>

            <header class="login-page__header">
                <div class="login-page__brand">
                    <img src="./assets/images/login/logo.svg" alt="E-BIT" class="login-page__logo" width="182" height="48" />
                </div>
                <p class="login-page__lead">BIS 단말 통합 관리 시스템</p>
            </header>

            <section class="login-card" aria-labelledby="loginTitle">
                <div class="login-card__intro">
                    <h1 class="login-card__title" id="loginTitle">로그인</h1>
                    <div class="login-card__desc">
                        <p>BIS 단말 통합 관리 시스템</p>
                        <p>로그인하여 시작하세요</p>
                    </div>
                </div>

                <div class="login-card__body">
                    <form class="login-card__form" action="#" method="post">
                        <div class="login-card__fields">
                            <div class="login-card__row">
                                <label for="userId" class="login-card__label">아이디</label>
                                <div class="login-card__control">
                                    <div class="login-card__field-box">
                                        <span class="login-card__field-icon login-card__field-icon--id" aria-hidden="true"></span>
                                        <input type="text" name="userId" id="userId" class="login-card__input"
                                            placeholder="아이디를 입력하세요" autocomplete="username" />
                                    </div>
                                </div>
                            </div>
                            <div class="login-card__row">
                                <label for="password" class="login-card__label">비밀번호</label>
                                <div class="login-card__control">
                                    <div class="login-card__field-box">
                                        <span class="login-card__field-icon login-card__field-icon--pw" aria-hidden="true"></span>
                                        <input type="password" name="password" id="password" class="login-card__input"
                                            placeholder="비밀번호를 입력하세요" autocomplete="current-password" />
                                        <button type="button" class="login-card__pw-toggle" aria-label="비밀번호 표시"
                                            aria-pressed="false">
                                            <span class="login-card__pw-toggle-icon login-card__pw-toggle-icon--show" aria-hidden="true"></span>
                                            <span class="login-card__pw-toggle-icon login-card__pw-toggle-icon--hide" aria-hidden="true"></span>
                                        </button>
                                    </div>
                                </div>
                            </div>
                        </div>

                        <div class="login-card__footer">
                            <div class="login-card__remember">
                                <label class="al-checkbox">
                                    <input class="al-checkbox__input" type="checkbox" name="rememberId" id="rememberId" value="Y" />
                                    <span class="al-checkbox__box" aria-hidden="true"></span>
                                    <span class="al-checkbox__text">로그인 유지</span>
                                </label>
                            </div>

                            <button type="submit" class="login-card__submit">로그인</button>

                            <div class="login-card__links">
                                <a href="#" class="login-card__link">
                                    아이디 찾기
                                    <span class="login-card__link-icon" aria-hidden="true"></span>
                                </a>
                                <a href="#" class="login-card__link">
                                    비밀번호 찾기
                                    <span class="login-card__link-icon" aria-hidden="true"></span>
                                </a>
                            </div>
                        </div>
                    </form>
                </div>
            </section>

            <p class="login-page__copyright">&copy; 2026 E-BIT. All rights reserved.</p>
        </div>
    </main>

    <script type="module" src="./js/page/login-page.js"></script>
</body>

</html>
