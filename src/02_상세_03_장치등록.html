<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>장치 등록 — E-bit 관리자</title>
    {{> meta}}
</head>

<body class="al-app al-app--no-nav al-app--subnav">
    {{> header}}
    {{> dash-work-tabnav}}

    <main class="al-app__main">
        <span class="dash-work__subtract" aria-hidden="true"></span>

        <div class="term-reg">
            <div class="term-reg__inner">
                <div class="term-reg__steps-wrap">
                    <div class="term-reg__steps" aria-label="단말 등록 진행 단계">
                        <div class="term-reg__seg">
                            <span class="term-reg__pill term-reg__pill--done">
                                <span class="term-reg__pill-ico" aria-hidden="true">
                                    <img src="./assets/images/icon/step/ico-step-complet.svg" alt="" />
                                </span>
                                <span class="term-reg__pill-txt">정보 확인</span>
                            </span>
                            <span class="term-reg__rail" aria-hidden="true"></span>
                        </div>
                        <div class="term-reg__seg">
                            <span class="term-reg__pill term-reg__pill--done">
                                <span class="term-reg__pill-ico" aria-hidden="true">
                                    <img src="./assets/images/icon/step/ico-step-complet.svg" alt="" />
                                </span>
                                <span class="term-reg__pill-txt">체크리스트</span>
                            </span>
                            <span class="term-reg__rail" aria-hidden="true"></span>
                        </div>
                        <div class="term-reg__seg">
                            <span class="term-reg__pill term-reg__pill--current">
                                <span class="term-reg__pill-ico" aria-hidden="true">
                                    <img src="./assets/images/icon/step/ico-step03-current.svg" alt="" />
                                </span>
                                <span class="term-reg__pill-txt">장치 등록</span>
                            </span>
                            <span class="term-reg__rail term-reg__rail--active" aria-hidden="true"></span>
                        </div>
                        <div class="term-reg__seg">
                            <span class="term-reg__pill">
                                <span class="term-reg__pill-ico" aria-hidden="true">
                                    <img src="./assets/images/icon/step/ico-step04.svg" alt="" />
                                </span>
                                <span class="term-reg__pill-txt">사진 촬영</span>
                            </span>
                            <span class="term-reg__rail" aria-hidden="true"></span>
                        </div>
                        <div class="term-reg__seg term-reg__seg--last">
                            <span class="term-reg__pill">
                                <span class="term-reg__pill-ico" aria-hidden="true">
                                    <img src="./assets/images/icon/step/ico-step05.svg" alt="" />
                                </span>
                                <span class="term-reg__pill-txt">제출 확인</span>
                            </span>
                        </div>
                    </div>
                </div>

                <section class="term-reg__card" aria-labelledby="device-reg-title">
                    <header class="term-reg__card-head">
                        <h1 class="term-reg__card-title" id="device-reg-title">장치 등록</h1>
                    </header>
                    <div class="term-reg__card-body">
                        <div class="term-reg__device-search" role="search" aria-label="장치 검색">
                            <div class="term-reg__device-search-field">
                                <input class="term-reg__device-search-input" id="device-search-q"
                                    type="search" autocomplete="off" placeholder="검색어를 입력해주세요." />
                                <button class="term-reg__device-search-submit" type="button" aria-label="검색">
                                    <img src="./assets/images/icon/ico-search.svg" alt="" />
                                </button>
                            </div>
                        </div>

                        <div class="term-reg__divider" aria-hidden="true"></div>

                        <div class="term-reg__conn-block">
                            <div class="term-reg__conn-head">
                                <h2 class="term-reg__conn-title">연결 정보 확인</h2>
                                <button class="term-reg__outline-btn-sm" type="button">새로고침</button>
                            </div>
                            <div class="term-reg__stat-grid">
                                <div class="term-reg__stat-cell">
                                    <span class="term-reg__stat-label">
                                        <span class="term-reg__dot" aria-hidden="true"></span>
                                        기기등록
                                    </span>
                                    <span class="term-reg__stat-pill"><span class="term-reg__stat-pill-val">완료</span></span>
                                </div>
                                <div class="term-reg__stat-cell">
                                    <span class="term-reg__stat-label">
                                        <span class="term-reg__dot" aria-hidden="true"></span>
                                        통신
                                    </span>
                                    <span class="term-reg__stat-pill"><span class="term-reg__stat-pill-val">완료</span></span>
                                </div>
                                <div class="term-reg__stat-cell">
                                    <span class="term-reg__stat-label">
                                        <span class="term-reg__dot" aria-hidden="true"></span>
                                        기기정보
                                    </span>
                                    <span class="term-reg__stat-pill"><span class="term-reg__stat-pill-val">완료</span></span>
                                </div>
                                <div class="term-reg__stat-cell">
                                    <span class="term-reg__stat-label">
                                        <span class="term-reg__dot" aria-hidden="true"></span>
                                        CPU
                                    </span>
                                    <span class="term-reg__stat-pill">
                                        <span class="term-reg__stat-pill-val">100</span>
                                        <span class="term-reg__stat-pill-unit">%</span>
                                    </span>
                                </div>
                                <div class="term-reg__stat-cell">
                                    <span class="term-reg__stat-label">
                                        <span class="term-reg__dot" aria-hidden="true"></span>
                                        MEM
                                    </span>
                                    <span class="term-reg__stat-pill">
                                        <span class="term-reg__stat-pill-val">16</span>
                                        <span class="term-reg__stat-pill-unit">GB</span>
                                    </span>
                                </div>
                                <div class="term-reg__stat-cell">
                                    <span class="term-reg__stat-label">
                                        <span class="term-reg__dot" aria-hidden="true"></span>
                                        배터리
                                    </span>
                                    <span class="term-reg__stat-pill">
                                        <span class="term-reg__stat-pill-val">100</span>
                                        <span class="term-reg__stat-pill-unit">%</span>
                                    </span>
                                </div>
                            </div>
                        </div>
                    </div>
                </section>
            </div>

            <footer class="term-reg__footer">
                <div class="term-reg__footer-inner">
                    <a class="term-reg__btn term-reg__btn--outline" href="./03_단말등록_02_체크리스트.html">이전</a>
                    <a class="term-reg__btn term-reg__btn--primary" href="./03_단말등록_04_사진촬영.html">다음</a>
                </div>
            </footer>
        </div>
    </main>

    <script type="module" src="./js/page/terminal-shell.js"></script>
</body>

</html>
