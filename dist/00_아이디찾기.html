<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>E-bit 관리자</title>
    
    <link rel="stylesheet" href="./assets/fonts/pretendard.css">
    <link rel="stylesheet" href="./lib/simplebar/simplebar.css">
    <link rel="stylesheet" href="./lib/dragula/dragula.min.css">
    <link rel="stylesheet" href="./lib/jQuery-ui/jquery-ui.min.css">
    <link rel="stylesheet" href="./lib/jQuery-ui/jquery-ui.theme.min.css">
    <link rel="stylesheet" href="./lib/datetimepicker/jquery.datetimepicker.css">
    <link rel="stylesheet" href="./lib/glightbox/glightbox.min.css">
    
    
    <script src="./lib/jQuery/jquery-3.7.1.js"></script>
    <script src="./lib/datetimepicker/jquery.datetimepicker.full.min.js"></script>
    <script src="./lib/jQuery-ui/jquery-ui.min.js"></script>
    <script src="./lib/simplebar/simplebar.min.js"></script>
    <script src="./lib/dragula/dragula.min.js"></script>
    <script src="./lib/glightbox/glightbox.min.js"></script>
  <script type="module" src="/2026_AF_EBIT/assets/index.js"></script>
  <script type="module" src="/2026_AF_EBIT/assets/login.js"></script>
  <link rel="stylesheet" href="/2026_AF_EBIT/assets/style.css">
</head>

<body class="login-page">

    <main class="login-page__wrap">
        <div class="login-page__content">
            <div class="login-page__visual" aria-hidden="true">
                <img src="/2026_AF_EBIT/assets/images/login-bg.png" alt="">
            </div>

            <div class="login-page__auth">
                <div class="login-page__brand">
                    <img src="/2026_AF_EBIT/assets/images/logo.svg" alt="E-BIT" class="login-page__logo">
                    <p class="login-page__brand-text">BIS 단말 통합 관리 시스템</p>
                </div>

                <section class="login-card" aria-labelledby="loginTitle">
                    <h1 class="login-card__title" id="loginTitle">아이디 찾기</h1>
                    <p class="login-card__subtitle">회원가입 시 입력한 정보로<br> 아이디를 찾을 수 있습니다.</p>

                    <form class="login-card__form" action="#" method="post">
                        <div class="login-card__field">
                            <label for="userId" class="login-card__label">아이디</label>
                            <div class="login-card__control login-card__control--id">
                                <input type="text" name="userId" id="userId" class="login-card__input" placeholder="아이디를 입력하세요." autocomplete="username" />
                            </div>
                        </div>

                        <div class="login-card__field">
                            <label for="password" class="login-card__label">이메일</label>
                            <div class="login-card__control login-card__control--email">
                                <input type="password" name="password" ipasswordd="" class="login-card__input" placeholder="이메일을 입력하세요." autocomplete="current-password" />
                            </div>
                        </div>

                        <button type="submit" class="login-card__submit mt20">아이디 찾기</button>
                    </form>

                    <div class="login-card__links">
                        <a href="#" class="login-card__link">비밀번호 찾기</a>
                    </div>
                </section>

                <p class="login-page__copyright">&copy; 2026 E-BIT. All rights reserved.</p>
            </div>
        </div>
    </main>

</body>

</html>
